<div class="finance-box">
    <h2>💰 Finanças do Império</h2>

    <input id="expressao" placeholder="Ex: 100 - 20 + 30">

    <button onclick="calcular()">Calcular agora</button>

    <div id="resultado">Resultado: -</div>
</div>

<style>
.finance-box{
    width: 400px;
    margin: 50px auto;
    padding: 20px;
    background: rgba(0,0,0,0.85);
    border: 1px solid gold;
    border-radius: 12px;
    color: white;
    text-align: center;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

.finance-box h2{
    color: gold;
}

.finance-box input{
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    background: #111;
    border: 1px solid gold;
    color: white;
    border-radius: 8px;
    text-align: center;
}

.finance-box button{
    width: 90%;
    padding: 10px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 8px;
}

#resultado{
    margin-top: 15px;
    font-size: 18px;
    color: #00ff99;
}
</style>

<script>
function calcular(){
    let expr = document.getElementById("expressao").value;

    try {
        // calcula expressão matemática segura básica
        let resultado = Function("return " + expr)();

        document.getElementById("resultado").innerText =
            "Resultado: " + resultado;

    } catch(e){
        document.getElementById("resultado").innerText =
            "Erro na expressão";
    }
}
</script>
